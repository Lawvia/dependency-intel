services:
  server:
    build: ./server
    ports:
      - "8080:8080"
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://server:8080
